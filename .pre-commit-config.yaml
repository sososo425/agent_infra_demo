# Agent Infra Demo — Git 预提交钩子
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files

default_language_version:
  python: python3

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-no-todo
        name: check-no-todo
        entry: scripts/check-no-todo.sh
        language: system
        pass_filenames: false

      - id: check-no-secrets
        name: check-no-secrets
        entry: scripts/check-no-secrets.sh
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--config-file=pyproject.toml]
        files: ^src/
