# Agent Infra Demo — Git 预提交钩子
# 安装: make install-dev (或 pip install pre-commit && pre-commit install)
# 手动运行: pre-commit run --all-files

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-no-todo
        name: check-no-todo
        entry: scripts/check-no-todo.sh
        language: system
        pass_filenames: false

      - id: check-no-secrets
        name: check-no-secrets
        entry: scripts/check-no-secrets.sh
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--config-file=pyproject.toml]
        files: ^src/
